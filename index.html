<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guia de Ligação · SDR Suri</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #eef1f8;
    --surface: #ffffff;
    --surface2: #f4f6fc;
    --border: #dde3f0;
    --navy: #0f1e3d;
    --blue: #3d4fd6;
    --blue-light: #eef0fd;
    --green: #00c896;
    --green-light: #e6faf5;
    --gray: #8a96b0;
    --text: #1a2240;
    --text-muted: #64718f;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(15,30,61,0.08);
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 1px 8px rgba(15,30,61,0.06);
  }
  .logo img { height: 32px; display: block; }
  .header-meta { display: flex; align-items: center; gap: 20px; }
  .header-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .progress-pill {
    background: var(--blue-light);
    color: var(--blue);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 100px;
    white-space: nowrap;
  }

  /* ── PROGRESS BAR (navegação entre blocos) ── */
  .progress-bar-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
  }
  .progress-steps {
    display: flex;
    align-items: stretch;
    overflow-x: auto;
  }
  .step-tab {
    flex: 1;
    min-width: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 8px 14px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .step-tab:hover { background: var(--surface2); }
  .step-tab.active { border-bottom-color: var(--blue); }
  .step-tab.visited { border-bottom-color: var(--green); }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--border);
    color: var(--gray);
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .step-tab.active .step-num { background: var(--blue); color: #fff; }
  .step-tab.visited .step-num { background: var(--green); color: #fff; }
  .step-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--gray);
    text-align: center;
    line-height: 1.3;
  }
  .step-tab.active .step-label { color: var(--blue); font-weight: 600; }
  .step-tab.visited .step-label { color: var(--green); }

  /* ── MAIN ── */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 36px 20px 80px;
  }

  /* ── BLOCK CARD ── */
  .block-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: none;
  }
  .block-card.visible { display: block; }

  .block-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--border);
  }
  .block-badge {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .block-title { font-size: 17px; font-weight: 700; color: var(--text); flex: 1; }

  /* ── ITEMS ── */
  .item-list { padding: 8px 0; }
  .item {
    padding: 16px 28px;
    border-bottom: 1px solid var(--surface2);
  }
  .item:last-child { border-bottom: none; }

  .item-text {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.45;
  }

  /* ── INSTRUÇÃO RECOLHIDA ── */
  .instr-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 7px;
    font-size: 11px;
    font-weight: 600;
    color: var(--blue);
    cursor: pointer;
    padding: 3px 0;
    border: none;
    background: none;
    font-family: inherit;
  }
  .instr-toggle:hover { color: var(--navy); }
  .instr-arrow { transition: transform 0.2s; display: inline-block; }
  .instr-toggle.open .instr-arrow { transform: rotate(90deg); }

  .instr-box {
    display: none;
    margin-top: 8px;
    border-radius: 10px;
    background: var(--navy);
    padding: 12px 16px;
    font-size: 12.5px;
    line-height: 1.6;
    color: #e3e8f7;
  }
  .instr-box.open { display: block; }
  .instr-box.pending {
    background: #fff8e0;
    border: 1px dashed #ffd166;
    color: #8a6d1f;
    font-style: italic;
  }

  /* ── OPÇÕES (A / B) ── */
  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    font-size: 12.5px;
    line-height: 1.6;
    color: #e3e8f7;
  }
  .option-item:last-child { border-bottom: none; padding-bottom: 0; }
  .option-item:first-child { padding-top: 0; }
  .option-letter {
    min-width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    color: var(--green);
    font-size: 10px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ── FOOTER NAV ── */
  .block-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .nav-btns { display: flex; gap: 10px; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 20px;
    border-radius: 9px;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-ghost { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: #3344c0; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #00a87e; }

  /* ── FINAL STATE ── */
  .done-screen { display: none; text-align: center; padding: 60px 40px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); }
  .done-screen.visible { display: block; }
  .done-icon {
    width: 64px; height: 64px;
    background: var(--green-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
  }
  .done-screen h2 { font-size: 22px; color: var(--text); margin-bottom: 8px; }
  .done-screen p { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.6; }
  .btn-restart {
    background: var(--blue-light);
    color: var(--blue);
    border: none;
    padding: 10px 24px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
  }
  .btn-restart:hover { background: #dde3fb; }
</style>
</head>

          "Você está em fase de pesquisa ou já tem um prazo em mente pra implementar uma solução?"
        ],
        pending: false
      },
      {
        text: "Pergunte ou valide quantos funcionários a empresa possui",
        options: [
          "Só pra eu entender o tamanho da operação: quantas pessoas trabalham na empresa hoje?",
          "Me fala um pouco do porte da empresa — quantos colaboradores vocês têm?"
        ],
        pending: false
      },
      {
        text: "Pergunte se há capacidade de investimento mínima de R$ 660,00 (APENAS SE QNT. FUNCIONÁRIOS MENOR QUE 10)",
        options: [
          "Nossos planos começam a partir de R$ 660 por mês. Isso está dentro da faixa de investimento que vocês têm disponível?",
          "Só pra alinhar expectativa: o plano de entrada é R$ 660/mês. Faz sentido pro momento de vocês?"
        ],
        pending: false
      }
    ]
  },
  {
    id: 3,
    title: "Validação de Requisitos Técnicos",
    color: "#3d6fd4",
    items: [
      {
        text: "Valide a situação do site do lead e informe ser necessário ter um site (APENAS SE NÃO DISPONÍVEL EM CADASTRO)",
        options: [
          "Vocês têm um site no ar? Pergunto porque pra ativar o WhatsApp Oficial, a Meta exige um site ativo da empresa.",
          "Só uma validação rápida: vocês têm site? É um requisito obrigatório da Meta pra homologar o número."
        ],
        pending: false
      }
    ]
  },
  {
    id: 4,
    title: "Agendamento e Próximos Passos",
    color: "#ffb703",
    textColor: "#1a2240",
    items: [
      {
        text: "Confirme dia, data e hora da reunião",
        options: [
          "Então fica confirmado: [dia], [data] às [hora]. Você vai receber o convite agora pelo WhatsApp.",
          "Perfeito, agendado pra [dia] às [hora]. Vou te mandar o link da reunião por WhatsApp já."
        ],
        pending: false
      },
      {
        text: "Confirme envio do convite por WhatsApp",
        options: [
          "Vou te mandar o link agora mesmo nesse número. Confirma pra mim que chegou, tá?",
          "O convite vai chegar aí no WhatsApp em instantes. Qualquer coisa é só me chamar nesse mesmo número."
        ],
        pending: false
      }
    ]
  },
  {
    id: 5,
    title: "Repasse de Contexto ao Closer",
    color: "#00c896",
    items: [
      {
        text: "Contextualize o lead sobre o que acontecerá na reunião com o closer",
        options: [
          "Na reunião, o especialista já vai entrar sabendo do seu cenário e vai te mostrar como a Suri resolve isso na prática. Vai ser rápido e direto — uns 30 minutos.",
          "Você vai conversar com um dos nossos especialistas. Ele já vai estar por dentro do que você me contou e vai te mostrar a solução aplicada ao seu negócio."
        ],
        pending: false
      }
    ]
  }
];

let currentBlock = 0;
let visited = new Array(BLOCKS.length).fill(false);

function render() {
  renderProgressSteps();
  renderBlocks();
  updatePill();
}

function renderProgressSteps() {
  const el = document.getElementById('progressSteps');
  el.innerHTML = BLOCKS.map((b, i) => {
    const cls = i === currentBlock ? 'active' : (visited[i] ? 'visited' : '');
    return `<div class="step-tab ${cls}" onclick="goToBlock(${i})">
      <div class="step-num">${i+1}</div>
      <div class="step-label">${b.title}</div>
    </div>`;
  }).join('');
}

function renderBlocks() {
  const container = document.getElementById('blocksContainer');
  const doneScreen = document.getElementById('doneScreen');

  if (currentBlock >= BLOCKS.length) {
    container.innerHTML = '';
    doneScreen.classList.add('visible');
    return;
  }
  doneScreen.classList.remove('visible');

  container.innerHTML = BLOCKS.map((b, bi) => {
    const isVisible = bi === currentBlock;
    const textColor = b.textColor || '#ffffff';

    const itemsHTML = b.items.map((item, ii) => {
      const key = `${bi}-${ii}`;
      const pendingCls = item.pending ? ' pending' : '';

      let content = '';
      if (item.options) {
        content = item.options.map((opt, oi) =>
          `<div class="option-item"><span class="option-letter">${String.fromCharCode(65+oi)}</span>${opt}</div>`
        ).join('');
      } else {
        content = item.instruction || '';
      }

      return `<div class="item">
        <div class="item-text">${item.text}</div>
        <button class="instr-toggle" onclick="toggleInstr(event,'instr-${key}',this)">
          <span class="instr-arrow">▶</span> ver instrução
        </button>
        <div class="instr-box${pendingCls}" id="instr-${key}">${content}</div>
      </div>`;
    }).join('');

    const isFirst = bi === 0;
    const isLast = bi === BLOCKS.length - 1;

    return `<div class="block-card ${isVisible ? 'visible' : ''}">
      <div class="block-header">
        <div class="block-badge" style="background:${b.color};color:${textColor}">${b.id}</div>
        <div class="block-title">${b.title}</div>
      </div>
      <div class="item-list">${itemsHTML}</div>
      <div class="block-footer">
        <div class="nav-btns">
          ${!isFirst ? `<button class="btn btn-ghost" onclick="prevBlock()">← Anterior</button>` : ''}
          ${!isLast
            ? `<button class="btn btn-primary" onclick="nextBlock()">Próximo bloco →</button>`
            : `<button class="btn btn-success" onclick="nextBlock()">Concluir ✓</button>`
          }
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleInstr(e, id, btn) {
  e.stopPropagation();
  const box = document.getElementById(id);
  box.classList.toggle('open');
  btn.classList.toggle('open');
}

function goToBlock(i) {
  currentBlock = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextBlock() {
  visited[currentBlock] = true;
  currentBlock++;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevBlock() {
  if (currentBlock > 0) {
    currentBlock--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function updatePill() {
  const el = document.getElementById('pillText');
  if (currentBlock >= BLOCKS.length) {
    el.textContent = 'Concluído ✓';
    el.style.background = '#e6faf5';
    el.style.color = '#00a87e';
  } else {
    el.textContent = `Bloco ${currentBlock + 1} de ${BLOCKS.length}`;
    el.style.background = '';
    el.style.color = '';
  }
}

function restart() {
  currentBlock = 0;
  visited = new Array(BLOCKS.length).fill(false);
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
</body>
</html>
